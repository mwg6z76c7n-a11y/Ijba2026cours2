<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte des lieux d'inclusion numérique - Bordeaux Métropole</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; }
        .info-panel {
            position: absolute;
            top: 20px;
            left: 50px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            max-width: 300px;
        }
        /* Style pour l'icône personnalisée */
        .custom-heart-icon {
            background: none !important;
            border: none !important;
        }
    </style>
</head>
<body>

    <div class="info-panel">
        <h1>Inclusion Numérique</h1>
        <p>Bordeaux Métropole</p>
        <p><i>Visualisation en temps réel du fichier CSV pour vérifier la couverture territoriale.</i></p>
        <p id="stats">Chargement des données...</p>
    </div>

    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <!-- PapaParse pour lire le CSV -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <script>
        // Initialiser la carte sur Bordeaux
        const map = L.map('map').setView([44.837789, -0.57918], 11);

        // Fond de carte OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Définir l'icône en forme de cœur rose (SVG pour être sûr du rendu)
        const heartSvg = `
            <svg width="30" height="30" viewBox="0 0 24 24" fill="#ff69b4" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
            </svg>
        `;

        const heartIcon = L.divIcon({
            className: 'custom-heart-icon',
            html: heartSvg,
            iconSize: [30, 30],
            iconAnchor: [15, 15]
        });

        const csvFile = './lieux_inclusion.csv';

        Papa.parse(csvFile, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                let count = 0;
                results.data.forEach((row) => {
                    let latStr = (row.latitude || "").toString().replace(',', '.');
                    let lonStr = (row.longitude || "").toString().replace(',', '.');
                    const lat = parseFloat(latStr);
                    const lon = parseFloat(lonStr);
                    
                    if (!isNaN(lat) && !isNaN(lon)) {
                        L.marker([lat, lon], { icon: heartIcon })
                            .bindPopup(`<b>${row.nom || 'Sans nom'}</b><br>${row.adresse_commune || ''}<br><i>${row.public_cible || ''}</i>`)
                            .addTo(map);
                        count++;
                    }
                });
                document.getElementById('stats').innerText = `${count} lieux affichés avec des cœurs roses.`;
            },
            error: function(err) {
                document.getElementById('stats').innerHTML = "<b style='color:red;'>Erreur de chargement.</b>";
            }
        });
    </script>
</body>
</html>
