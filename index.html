<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte des lieux d'inclusion numérique - Bordeaux Métropole</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; }
        .info-panel {
            position: absolute;
            top: 20px;
            left: 50px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            max-width: 300px;
        }
    </style>
</head>
<body>

    <div class="info-panel">
        <h1>Inclusion Numérique</h1>
        <p>Bordeaux Métropole</p>
        <p><i>Visualisation en temps réel du fichier CSV pour vérifier la couverture territoriale.</i></p>
        <p id="stats">Chargement des données...</p>
    </div>

    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <!-- PapaParse pour lire le CSV -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js" integrity="sha512-V9879uE76zB0Kj+1B96p21T9wDk/rK7K9W7p5hM/N5p0/6V4N2/0p/5W4T5H9/0n/1z4W2/2+1F0z4W6/2+1F0z4W6/2+1F0z4W6" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <script>
        // Initialiser la carte sur Bordeaux
        const map = L.map('map').setView([44.837789, -0.57918], 11);

        // Fond de carte OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Charger et parser le CSV directement
        const csvFile = 'RAW_met_lieux_inclusion_numerique - RAW_met_lieux_inclusion_numerique.csv';

        Papa.parse(csvFile, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                console.log("Données chargées :", results.data.length, "lignes");
                let count = 0;
                results.data.forEach((row, index) => {
                    // Remplacer les virgules éventuelles par des points
                    let latStr = (row.latitude || "").toString().replace(',', '.');
                    let lonStr = (row.longitude || "").toString().replace(',', '.');
                    
                    const lat = parseFloat(latStr);
                    const lon = parseFloat(lonStr);
                    
                    if (!isNaN(lat) && !isNaN(lon)) {
                        L.marker([lat, lon])
                            .bindPopup(`<b>${row.nom || 'Sans nom'}</b><br>${row.adresse_commune || ''}<br><i>${row.public_cible || ''}</i>`)
                            .addTo(map);
                        count++;
                    } else {
                        if (index < 5) console.warn("Coordonnées invalides ligne", index, row.nom, latStr, lonStr);
                    }
                });
                document.getElementById('stats').innerText = `${count} lieux affichés en direct depuis le CSV.`;
                if (count === 0) {
                    document.getElementById('stats').innerHTML += "<br><b style='color:red;'>Aucun point valide trouvé. Vérifiez la console (F12).</b>";
                }
            },
            error: function(err) {
                document.getElementById('stats').innerHTML = "<b style='color:red;'>Erreur de chargement du CSV.</b><br>Assurez-vous de lancer la page via un serveur (Live Server).";
                console.error("Erreur PapaParse:", err);
            }
        });
    </script>
</body>
</html>
